spring.application.name=SpringBootJpaDemo
#configure server port
server.port=8080

#configure db properties 
spring.datasource.url=jdbc:mysql://localhost:3306/sec53
spring.datasource.username=root
spring.datasource.password=root

#configure hibernate and jpa properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#this dilaect is optional but in console appplcations we must provide like in hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
